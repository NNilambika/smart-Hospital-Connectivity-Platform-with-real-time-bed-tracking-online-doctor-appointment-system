<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Appointment Confirmed - LifeLink 24/7</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: slideUp 0.5s ease;
      text-align: center;
    }
    
    @keyframes slideUp {
      from {
        transform: translateY(50px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }
    
    .success-icon {
      font-size: 5em;
      color: #27ae60;
      margin-bottom: 20px;
    }
    
    .queue-number {
      font-size: 5em;
      font-weight: bold;
      color: #27ae60;
      margin: 20px 0;
      padding: 20px;
      background: #e8f5e9;
      border-radius: 15px;
      display: inline-block;
    }
    
    .details {
      background: #f8f9fa;
      padding: 25px;
      border-radius: 15px;
      margin: 30px 0;
      text-align: left;
    }
    
    .detail-row {
      display: flex;
      justify-content: space-between;
      margin: 10px 0;
      padding: 5px 0;
      border-bottom: 1px dashed #ddd;
    }
    
    .home-btn {
      background: #3498db;
      color: white;
      border: none;
      padding: 15px 30px;
      border-radius: 10px;
      font-size: 1.1em;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="success-icon">✅</div>
    <h1>Appointment Confirmed!</h1>
    
    <div class="queue-number" id="queueNumber">-</div>
    <p style="font-size: 1.2em;">Your Queue Number</p>
    
    <div class="details" id="details"></div>
    
    <a href="index.html" class="home-btn">← Back to Home</a>
  </div>

  <script>
    const queueNumber = localStorage.getItem('currentQueueNumber') || '1';
    const hospitalName = localStorage.getItem('selectedHospitalName') || 'Hospital';
    const doctorName = localStorage.getItem('selectedDoctor') || 'Doctor';
    const patientName = localStorage.getItem('patientName') || 'Patient';
    
    document.getElementById('queueNumber').textContent = queueNumber;
    document.getElementById('details').innerHTML = `
      <div class="detail-row"><span>Hospital:</span> <strong>${hospitalName}</strong></div>
      <div class="detail-row"><span>Doctor:</span> <strong>${doctorName}</strong></div>
      <div class="detail-row"><span>Patient:</span> <strong>${patientName}</strong></div>
      <div class="detail-row"><span>Date:</span> <strong>${new Date().toLocaleDateString()}</strong></div>
    `;
  </script>
</body>
</html>
