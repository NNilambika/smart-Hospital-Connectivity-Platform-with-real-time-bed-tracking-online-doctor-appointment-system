<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add New Patient - LifeLink 24/7</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      font-family: 'Segoe UI', sans-serif;
    }
    
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: slideUp 0.5s ease;
    }
    
    @keyframes slideUp {
      from {
        transform: translateY(50px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }
    
    h1 {
      color: #2c3e50;
      margin-bottom: 30px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    /* Bed Info Card */
    .bed-info-card {
      background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
      padding: 25px;
      border-radius: 15px;
      margin-bottom: 30px;
      display: flex;
      align-items: center;
      gap: 20px;
      border-left: 4px solid #1976d2;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    
    .bed-info-card i {
      font-size: 3em;
      color: #1976d2;
    }
    
    .bed-info-content {
      flex: 1;
    }
    
    .bed-info-content h3 {
      color: #2c3e50;
      margin-bottom: 5px;
      font-size: 1.2em;
    }
    
    .bed-number-badge {
      font-size: 2.2em;
      font-weight: bold;
      color: #1976d2;
      margin: 5px 0;
    }
    
    .hospital-name-badge {
      background: #1976d2;
      color: white;
      padding: 5px 15px;
      border-radius: 20px;
      display: inline-block;
      font-size: 0.9em;
    }
    
    .error-message {
      background: #fee;
      color: #e74c3c;
      padding: 15px;
      border-radius: 8px;
      margin: 20px 0;
      display: flex;
      align-items: center;
      gap: 10px;
      border-left: 4px solid #e74c3c;
    }
    
    .error-message i {
      font-size: 1.5em;
    }
    
    .form-section {
      background: #f8f9fa;
      padding: 25px;
      border-radius: 10px;
      margin-bottom: 25px;
    }
    
    .form-section h3 {
      color: #2c3e50;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 15px;
    }
    
    .form-group {
      margin-bottom: 15px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #2c3e50;
      font-weight: 500;
    }
    
    .form-group label i {
      color: #3498db;
      margin-right: 5px;
    }
    
    .form-group input,
    .form-group select {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1em;
      transition: all 0.3s;
    }
    
    .form-group input:focus,
    .form-group select:focus {
      border-color: #3498db;
      outline: none;
      box-shadow: 0 0 0 3px rgba(52,152,219,0.1);
    }
    
    .submit-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.1em;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.3s;
      margin: 20px 0 10px;
    }
    
    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(39,174,96,0.3);
    }
    
    .submit-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }
    
    .cancel-btn {
      width: 100%;
      padding: 15px;
      background: #95a5a6;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.1em;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .cancel-btn:hover {
      background: #7f8c8d;
    }
    
    .back-link {
      text-align: center;
      margin-top: 20px;
    }
    
    .back-link a {
      color: #667eea;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><i class="fas fa-user-plus"></i> Add New Patient</h1>
    
    <!-- Bed Information Card -->
    <div class="bed-info-card" id="bedInfoCard">
      <i class="fas fa-bed"></i>
      <div class="bed-info-content">
        <h3>Assigning to Bed</h3>
        <div class="bed-number-badge" id="selectedBedDisplay">Not selected</div>
        <div class="hospital-name-badge" id="selectedHospitalDisplay"></div>
      </div>
    </div>
    
    <!-- Error Message (if no bed selected) -->
    <div id="errorMessage" class="error-message" style="display: none;">
      <i class="fas fa-exclamation-triangle"></i>
      <span>No bed selected! Please go back and select a bed first.</span>
    </div>
    
    <form id="patientForm" onsubmit="event.preventDefault(); savePatient();">
      <!-- Patient Information -->
      <div class="form-section">
        <h3><i class="fas fa-user"></i> Patient Information</h3>
        
        <div class="form-group">
          <label><i class="fas fa-user-tag"></i> Full Name *</label>
          <input type="text" id="patientName" placeholder="Enter patient's full name" required>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label><i class="fas fa-calendar-alt"></i> Age *</label>
            <input type="number" id="patientAge" placeholder="Age" required>
          </div>
          <div class="form-group">
            <label><i class="fas fa-venus-mars"></i> Gender *</label>
            <select id="patientGender" required>
              <option value="">Select Gender</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
              <option value="Other">Other</option>
            </select>
          </div>
        </div>
        
        <div class="form-group">
          <label><i class="fas fa-phone"></i> Mobile Number *</label>
          <input type="tel" id="patientMobile" placeholder="10-digit mobile number" maxlength="10" required>
        </div>
      </div>
      
      <!-- Medical Information -->
      <div class="form-section">
        <h3><i class="fas fa-user-md"></i> Medical Information</h3>
        
        <div class="form-group">
          <label><i class="fas fa-stethoscope"></i> Assign Doctor *</label>
          <select id="assignedDoctor" required>
            <option value="">Select Doctor</option>
            <option value="Dr. Rajesh Kumar - Cardiologist">Dr. Rajesh Kumar - Cardiologist</option>
            <option value="Dr. Priya Sharma - Neurologist">Dr. Priya Sharma - Neurologist</option>
            <option value="Dr. Suresh Patel - ENT">Dr. Suresh Patel - ENT</option>
            <option value="Dr. Anita Desai - Pediatrician">Dr. Anita Desai - Pediatrician</option>
          </select>
        </div>
        
        <div class="form-group">
          <label><i class="fas fa-notes-medical"></i> Symptoms / Diagnosis</label>
          <textarea id="symptoms" rows="3" placeholder="Enter symptoms or diagnosis"></textarea>
        </div>
      </div>
      
      <button type="submit" class="submit-btn" id="submitBtn">
        <i class="fas fa-save"></i> Save Patient & Assign to Bed
      </button>
    </form>
    
    <button class="cancel-btn" onclick="goBack()">
      <i class="fas fa-times"></i> Cancel
    </button>
    
    <div class="back-link">
      <a href="management-dashboard.html"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
    </div>
  </div>

  <script>
    // ====================================
    // GET BED AND HOSPITAL DATA - FIXED
    // ====================================
    
    // Try multiple possible keys for bed ID
    let selectedBed = 
      localStorage.getItem('selectedBed') || 
      localStorage.getItem('selectedBedNumber') || 
      localStorage.getItem('bedToAssign') || 
      localStorage.getItem('currentBedId') || 
      null;
    
    // Get hospital data from multiple possible keys
    let hospitalId = 
      localStorage.getItem('hospitalId') || 
      localStorage.getItem('selectedHospitalId') || 
      'hosp_healthcare_002';
    
    let hospitalName = 
      localStorage.getItem('hospitalName') || 
      localStorage.getItem('selectedHospitalName') || 
      'Health Care+';
    
    console.log("🔍 Add Patient Page Loaded:");
    console.log("Selected Bed:", selectedBed);
    console.log("Hospital ID:", hospitalId);
    console.log("Hospital Name:", hospitalName);
    
    // Display bed and hospital info
    const bedDisplay = document.getElementById('selectedBedDisplay');
    const hospitalDisplay = document.getElementById('selectedHospitalDisplay');
    const errorMsg = document.getElementById('errorMessage');
    
    if (selectedBed) {
      bedDisplay.textContent = `Bed #${selectedBed}`;
      bedDisplay.style.color = '#1976d2';
      errorMsg.style.display = 'none';
    } else {
      bedDisplay.textContent = 'No bed selected';
      bedDisplay.style.color = '#e74c3c';
      errorMsg.style.display = 'flex';
    }
    
    hospitalDisplay.textContent = hospitalName;
    
    // ====================================
    // SAVE PATIENT FUNCTION
    // ====================================
    window.savePatient = function() {
      // Check if bed is selected
      if (!selectedBed) {
        alert('❌ No bed selected! Please go back and select a bed first.');
        return;
      }
      
      // Get form values
      const patientName = document.getElementById('patientName').value.trim();
      const patientAge = document.getElementById('patientAge').value;
      const patientGender = document.getElementById('patientGender').value;
      const patientMobile = document.getElementById('patientMobile').value.trim();
      const assignedDoctor = document.getElementById('assignedDoctor').value;
      const symptoms = document.getElementById('symptoms').value.trim();
      
      // Validation
      if (!patientName) {
        alert('Please enter patient name');
        return;
      }
      
      if (!patientAge) {
        alert('Please enter patient age');
        return;
      }
      
      if (!patientGender) {
        alert('Please select gender');
        return;
      }
      
      if (!patientMobile) {
        alert('Please enter mobile number');
        return;
      }
      
      if (patientMobile.length !== 10) {
        alert('Please enter a valid 10-digit mobile number');
        return;
      }
      
      if (!assignedDoctor) {
        alert('Please select a doctor');
        return;
      }
      
      // Show loading
      const submitBtn = document.getElementById('submitBtn');
      submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
      submitBtn.disabled = true;
      
      // Create patient data
      const patientData = {
        id: 'PAT_' + Date.now(),
        name: patientName,
        age: patientAge,
        gender: patientGender,
        mobile: patientMobile,
        doctor: assignedDoctor,
        symptoms: symptoms || 'No symptoms recorded',
        bedId: parseInt(selectedBed),
        bedNumber: parseInt(selectedBed),
        hospitalId: hospitalId,
        hospitalName: hospitalName,
        admissionDate: new Date().toISOString(),
        admissionTime: new Date().toLocaleString(),
        status: 'active'
      };
      
      console.log("📦 Saving patient:", patientData);
      
      // ====================================
      // UPDATE BED STATUS
      // ====================================
      const bedsKey = `beds_${hospitalId}`;
      let beds = JSON.parse(localStorage.getItem(bedsKey)) || [];
      
      // If no beds, create default
      if (beds.length === 0) {
        for (let i = 1; i <= 30; i++) {
          beds.push({ id: i, status: 'available', patient: null });
        }
      }
      
      // Find and update the bed
      const bedIndex = beds.findIndex(b => b.id === parseInt(selectedBed));
      if (bedIndex !== -1) {
        beds[bedIndex].status = 'occupied';
        beds[bedIndex].patient = patientName;
        localStorage.setItem(bedsKey, JSON.stringify(beds));
        console.log(`✅ Bed #${selectedBed} updated to occupied with patient: ${patientName}`);
      }
      
      // ====================================
      // SAVE TO PATIENTS LIST
      // ====================================
      const patientsKey = `patients_${hospitalId}`;
      let patients = JSON.parse(localStorage.getItem(patientsKey)) || [];
      patients.push(patientData);
      localStorage.setItem(patientsKey, JSON.stringify(patients));
      
      // ====================================
      // CLEAR SELECTED BED
      // ====================================
      localStorage.removeItem('selectedBed');
      localStorage.removeItem('selectedBedNumber');
      localStorage.removeItem('bedToAssign');
      localStorage.removeItem('currentBedId');
      
      console.log("✅ All data saved successfully");
      
      // Success message
      alert(`✅ Patient ${patientName} successfully assigned to Bed #${selectedBed}`);
      
      // Redirect back to dashboard
      window.location.href = 'management-dashboard.html';
    };
    
    // ====================================
    // GO BACK FUNCTION
    // ====================================
    window.goBack = function() {
      window.location.href = 'management-dashboard.html';
    };
  </script>
</body>
</html>
