<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Dashboard - LifeLink 24/7</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 20px;
    }
    
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    
    h1 {
      color: #2c3e50;
      margin-bottom: 20px;
    }
    
    .hospital-info {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 30px;
      border-left: 4px solid #3498db;
    }
    
    .bed-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin: 30px 0;
    }
    
    .bed-card {
      background: #f8f9fa;
      padding: 25px;
      border-radius: 10px;
      text-align: center;
    }
    
    .bed-card.green {
      background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
      color: white;
    }
    
    .bed-card.blue {
      background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
      color: white;
    }
    
    .bed-number {
      font-size: 2.5em;
      font-weight: bold;
      margin: 10px 0;
    }
    
    .appointment-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.2em;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 20px;
    }
    
    .appointment-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(52,152,219,0.3);
    }
    
    .back-link {
      margin-top: 30px;
      text-align: center;
    }
    
    .back-link a {
      color: #667eea;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><i class="fas fa-hospital"></i> <span id="hospitalName">Loading...</span></h1>
    
    <div class="hospital-info">
      <p><i class="fas fa-map-marker-alt"></i> <span id="hospitalLocation"></span></p>
    </div>
    
    <div class="bed-stats">
      <div class="bed-card green">
        <h3>General Ward Beds</h3>
        <div class="bed-number" id="generalBeds">20</div>
      </div>
      <div class="bed-card blue">
        <h3>ICU Beds</h3>
        <div class="bed-number" id="icuBeds">19</div>
      </div>
    </div>
    
    <!-- FIXED: This button now goes to doctors list first -->
    <button class="appointment-btn" onclick="goToDoctors()">
      <i class="fas fa-calendar-check"></i> Take Appointment
    </button>
    
    <div class="back-link">
      <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Home</a>
    </div>
  </div>

  <script>
    // Get hospital data from URL or localStorage
    const hospitalId = localStorage.getItem('selectedHospitalId');
    const hospitalName = localStorage.getItem('selectedHospitalName') || 'Sanjivini Hospital';
    const hospitalCity = localStorage.getItem('selectedHospitalCity') || 'Bangalore';
    
    document.getElementById('hospitalName').textContent = hospitalName;
    document.getElementById('hospitalLocation').textContent = hospitalCity;
    
    // Load bed data
    function loadBedStats() {
      const bedsKey = `beds_${hospitalId}`;
      let beds = JSON.parse(localStorage.getItem(bedsKey));
      
      if (!beds) {
        // Default values
        document.getElementById('generalBeds').textContent = '20';
        document.getElementById('icuBeds').textContent = '19';
        return;
      }
      
      let general = 0, icu = 0;
      beds.forEach(bed => {
        if (bed.id <= 20 && bed.status === 'available') general++;
        else if (bed.id > 20 && bed.status === 'available') icu++;
      });
      
      document.getElementById('generalBeds').textContent = general;
      document.getElementById('icuBeds').textContent = icu;
    }
    
    // FIXED: Go to doctors list first
    window.goToDoctors = function() {
      window.location.href = 'doctors.html';
    };
    
    loadBedStats();
  </script>
</body>
</html>
