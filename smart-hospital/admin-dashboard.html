<!-- Doctor Management Section - Only visible to admin -->
<div id="doctorManagementSection" class="doctor-management-section" style="display: none;">
  <h2><i class="fas fa-user-md"></i> Doctor Management</h2>
  
  <!-- Add Doctor Form -->
  <div class="add-doctor-form">
    <h3>Add New Doctor</h3>
    <div class="form-row">
      <div class="form-group">
        <label>Doctor Name</label>
        <input type="text" id="doctorName" placeholder="Enter doctor name">
      </div>
      <div class="form-group">
        <label>Specialization</label>
        <input type="text" id="doctorSpecialization" placeholder="e.g., Cardiologist">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Qualification</label>
        <input type="text" id="doctorQualification" placeholder="e.g., MBBS, MD">
      </div>
      <div class="form-group">
        <label>Experience (years)</label>
        <input type="number" id="doctorExperience" placeholder="Years">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Available Days</label>
        <select id="doctorDays" multiple size="3">
          <option value="Monday">Monday</option>
          <option value="Tuesday">Tuesday</option>
          <option value="Wednesday">Wednesday</option>
          <option value="Thursday">Thursday</option>
          <option value="Friday">Friday</option>
          <option value="Saturday">Saturday</option>
        </select>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="doctorStatus">
          <option value="present">Present (Available)</option>
          <option value="absent">Absent (Not Available)</option>
        </select>
      </div>
    </div>
    <button onclick="addDoctor()" class="save-btn">
      <i class="fas fa-save"></i> Add Doctor
    </button>
  </div>

  <!-- Doctors List -->
  <h3>Current Doctors</h3>
  <div id="doctorsList" class="doctors-grid">
    <!-- Doctors will be loaded here -->
  </div>
</div>
