<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Details - LifeLink 24/7</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: slideUp 0.5s ease;
    }
    
    @keyframes slideUp {
      from {
        transform: translateY(50px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }
    
    h1 {
      color: #2c3e50;
      margin-bottom: 20px;
      text-align: center;
    }
    
    .doctor-info {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 25px;
      border-left: 4px solid #3498db;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #2c3e50;
      font-weight: 500;
    }
    
    .form-group input,
    .form-group select {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1em;
      transition: all 0.3s;
      box-sizing: border-box;
    }
    
    .form-group input:focus,
    .form-group select:focus {
      border-color: #3498db;
      outline: none;
      box-shadow: 0 0 0 3px rgba(52,152,219,0.1);
    }
    
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }
    
    .next-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.1em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 20px;
    }
    
    .next-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(52,152,219,0.3);
    }
    
    .back-link {
      text-align: center;
      margin-top: 20px;
    }
    
    .back-link a {
      color: #667eea;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><i class="fas fa-user"></i> Patient Details</h1>
    
    <div class="doctor-info">
      <p><strong>Doctor:</strong> <span id="displayDoctor">Loading...</span></p>
      <p><strong>Hospital:</strong> <span id="displayHospital">Loading...</span></p>
    </div>
    
    <form id="patientForm" onsubmit="event.preventDefault(); savePatientDetails();">
      <div class="form-group">
        <label>Full Name *</label>
        <input type="text" id="patientName" placeholder="Enter your full name" required>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label>Age *</label>
          <input type="number" id="patientAge" placeholder="Age" required>
        </div>
        <div class="form-group">
          <label>Gender *</label>
          <select id="patientGender" required>
            <option value="">Select</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>
      
      <div class="form-group">
        <label>Mobile Number *</label>
        <input type="tel" id="patientMobile" placeholder="10-digit mobile number" maxlength="10" required>
      </div>
      
      <button type="submit" class="next-btn" id="submitBtn">
        <i class="fas fa-arrow-right"></i> Next
      </button>
    </form>
    
    <div class="back-link">
      <a href="doctors.html"><i class="fas fa-arrow-left"></i> Back to Doctors</a>
    </div>
  </div>

  <script>
    // Load doctor and hospital info
    const doctorName = localStorage.getItem('selectedDoctor') || 'Doctor';
    const doctorSpecialist = localStorage.getItem('selectedSpecialist') || '';
    const hospitalName = localStorage.getItem('selectedHospitalName') || 'Hospital';
    
    document.getElementById('displayDoctor').textContent = `${doctorName} (${doctorSpecialist})`;
    document.getElementById('displayHospital').textContent = hospitalName;
    
    // Save patient details and redirect to payment
    window.savePatientDetails = function() {
      const name = document.getElementById('patientName').value.trim();
      const age = document.getElementById('patientAge').value;
      const gender = document.getElementById('patientGender').value;
      const mobile = document.getElementById('patientMobile').value.trim();
      
      if (!name || !age || !gender || !mobile) {
        alert('Please fill all fields');
        return;
      }
      
      if (mobile.length !== 10) {
        alert('Please enter valid 10-digit mobile number');
        return;
      }
      
      // Store patient details
      localStorage.setItem('patientName', name);
      localStorage.setItem('patientAge', age);
      localStorage.setItem('patientGender', gender);
      localStorage.setItem('patientMobile', mobile);
      
      console.log('Patient details saved, redirecting to payment...');
      
      // Redirect to payment page
      window.location.href = 'payment.html';
    };
  </script>
</body>
</html>
