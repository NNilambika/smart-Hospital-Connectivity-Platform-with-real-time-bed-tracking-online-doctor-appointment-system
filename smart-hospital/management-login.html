<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hospital Login - LifeLink 24/7</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 20px;
    }
    
    .login-container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: slideUp 0.5s ease;
    }
    
    @keyframes slideUp {
      from {
        transform: translateY(50px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }
    
    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .login-header i {
      font-size: 3em;
      color: #667eea;
      margin-bottom: 10px;
    }
    
    .login-header h1 {
      color: #2c3e50;
      margin: 10px 0;
      font-size: 1.8em;
    }
    
    .login-header p {
      color: #666;
      font-size: 0.9em;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #2c3e50;
      font-weight: 500;
      font-size: 0.95em;
    }
    
    .form-group input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 1em;
      transition: all 0.3s;
      box-sizing: border-box;
    }
    
    .form-group input:focus {
      border-color: #667eea;
      outline: none;
      box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
    }
    
    .login-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1.1em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 20px 0 10px;
    }
    
    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102,126,234,0.3);
    }
    
    .login-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
    
    .error-message {
      background: #fee;
      color: #e74c3c;
      padding: 12px;
      border-radius: 8px;
      margin: 15px 0;
      text-align: center;
      font-size: 0.9em;
      display: none;
      border-left: 4px solid #e74c3c;
    }
    
    .error-message.show {
      display: block;
    }
    
    .back-link {
      text-align: center;
      margin-top: 20px;
    }
    
    .back-link a {
      color: #667eea;
      text-decoration: none;
      font-size: 0.95em;
    }
    
    .back-link a:hover {
      text-decoration: underline;
    }
    
    .loader {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
      display: inline-block;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <i class="fas fa-hospital-user"></i>
      <h1>Hospital Login</h1>
      <p>Enter your registered credentials</p>
    </div>
    
    <div id="errorMessage" class="error-message"></div>
    
    <div class="form-group">
      <label><i class="fas fa-envelope"></i> Email</label>
      <input type="email" id="email" placeholder="Enter your registered email">
    </div>
    
    <div class="form-group">
      <label><i class="fas fa-lock"></i> Password</label>
      <input type="password" id="password" placeholder="Enter your password">
    </div>
    
    <button class="login-btn" onclick="handleLogin()" id="loginBtn">
      <i class="fas fa-sign-in-alt"></i> Login
    </button>
    
    <div class="back-link">
      <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Home</a>
    </div>
  </div>

  <script>
    // ====================================
    // REGISTERED HOSPITALS DATABASE
    // (These should match what's in your registration system)
    // ====================================
    const registeredHospitals = {
      // Format: email: { id, name, password, city }
      'sanjivini@hospital.com': {
        id: 'hosp_sanjivini_001',
        name: 'Sanjivini Hospital',
        password: 'password123',
        city: 'Bangalore'
      },
      'healthcare@hospital.com': {
        id: 'hosp_healthcare_002',
        name: 'Health Care+',
        password: 'password123',
        city: 'Mumbai'
      },
      'veda@hospital.com': {
        id: 'hosp_veda_003',
        name: 'Veda Hospital',
        password: 'password123',
        city: 'Delhi'
      }
    };

    // ====================================
    // STORE HOSPITAL DATA IN LOCALSTORAGE
    // ====================================
    function storeHospitalData(hospital) {
      console.log("✅ Storing hospital data:", hospital.name);
      
      // Store with MULTIPLE keys for redundancy
      localStorage.setItem('hospitalId', hospital.id);
      localStorage.setItem('hospitalName', hospital.name);
      localStorage.setItem('hospitalCity', hospital.city);
      localStorage.setItem('selectedHospitalId', hospital.id);
      localStorage.setItem('selectedHospitalName', hospital.name);
      localStorage.setItem('staffName', hospital.name);
      localStorage.setItem('staffRole', 'admin');
      localStorage.setItem('staffEmail', hospital.email);
      localStorage.setItem('isLoggedIn', 'true');
      localStorage.setItem('loginTime', new Date().toISOString());
      
      // Also store in a hospitals list for reference
      const hospitalsList = JSON.parse(localStorage.getItem('hospitalsList') || '[]');
      if (!hospitalsList.find(h => h.id === hospital.id)) {
        hospitalsList.push({
          id: hospital.id,
          name: hospital.name,
          email: hospital.email,
          city: hospital.city
        });
        localStorage.setItem('hospitalsList', JSON.stringify(hospitalsList));
      }
    }

    // ====================================
    // MAIN LOGIN FUNCTION
    // ====================================
    window.handleLogin = function() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorMessage = document.getElementById('errorMessage');
      const loginBtn = document.getElementById('loginBtn');
      
      // Hide previous error
      errorMessage.classList.remove('show');
      
      // Validate input
      if (!email || !password) {
        errorMessage.textContent = 'Please enter both email and password';
        errorMessage.classList.add('show');
        return;
      }
      
      // Show loading
      loginBtn.innerHTML = '<span class="loader"></span> Logging in...';
      loginBtn.disabled = true;
      
      // Simulate network delay
      setTimeout(() => {
        // Check if hospital exists in registered database
        const hospital = registeredHospitals[email];
        
        if (hospital && hospital.password === password) {
          // Successful login
          storeHospitalData(hospital);
          
          // Show success and redirect
          errorMessage.style.background = '#d4edda';
          errorMessage.style.color = '#155724';
          errorMessage.style.borderLeftColor = '#27ae60';
          errorMessage.innerHTML = `<i class="fas fa-check-circle"></i> Welcome to ${hospital.name}!`;
          errorMessage.classList.add('show');
          
          setTimeout(() => {
            window.location.href = 'management-dashboard.html';
          }, 1500);
          
        } else {
          // Failed login
          errorMessage.innerHTML = '<i class="fas fa-exclamation-circle"></i> Invalid email or password';
          errorMessage.classList.add('show');
          
          loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
          loginBtn.disabled = false;
        }
      }, 1000);
    };

    // ====================================
    // CHECK IF ALREADY LOGGED IN
    // ====================================
    window.onload = function() {
      if (localStorage.getItem('isLoggedIn') === 'true') {
        const hospitalName = localStorage.getItem('hospitalName') || 'Hospital';
        console.log(`Already logged in to ${hospitalName}`);
      }
    };
  </script>
</body>
</html>
